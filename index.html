<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Posca voorraad</title>
<style>
  /* Token system: paper-white chrome, ink text, one brand-red accent.
     The 222 official pigment hexes are the real palette; everything else
     stays monochrome so they render uncontaminated. */
  :root {
    --paper: #ffffff;
    --ink: #141414;
    --muted: #6b6b6b;
    --faint: #a3a3a3;
    --hairline: #e6e6e6;
    --wash: #f5f5f4;
    --posca-red: #e63312;
    --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    /* 4px spacing scale */
    --s1: 4px; --s2: 8px; --s3: 12px; --s4: 16px; --s6: 24px; --s8: 32px;
    --bar-h: 112px;
  }

  * { box-sizing: border-box; }

  html {
    scroll-behavior: smooth;
  }
  @media (prefers-reduced-motion: reduce) {
    html { scroll-behavior: auto; }
    * { transition: none !important; }
  }

  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 16px;
    line-height: 1.5;
    -webkit-text-size-adjust: 100%;
  }

  /* Sticky bar: title + label-mode toggle, then size jump pills */
  .bar {
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--paper);
    border-bottom: 1px solid var(--hairline);
  }
  .bar-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--s3);
    padding: var(--s2) var(--s4) 0;
    min-height: 52px;
  }
  .bar h1 {
    margin: 0;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: -0.01em;
    white-space: nowrap;
  }
  .bar h1::before {
    content: "";
    display: inline-block;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--posca-red);
    margin-right: var(--s2);
  }

  .mode {
    display: flex;
    gap: 2px;
    background: var(--wash);
    border-radius: 10px;
    padding: 2px;
  }
  .mode button {
    appearance: none;
    border: 0;
    margin: 0;
    background: transparent;
    color: var(--muted);
    font: 600 13px/1 var(--sans);
    padding: 0 var(--s3);
    min-height: 40px;
    min-width: 44px;
    border-radius: 8px;
    cursor: pointer;
    transition: background-color 150ms, color 150ms;
  }
  .mode button[aria-pressed="true"] {
    background: var(--ink);
    color: var(--paper);
  }
  .mode button:focus-visible,
  .sizes a:focus-visible {
    outline: 2px solid var(--posca-red);
    outline-offset: 2px;
  }

  .sizes {
    display: flex;
    gap: var(--s2);
    padding: var(--s2) var(--s4) var(--s2);
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .sizes::-webkit-scrollbar { display: none; }
  .sizes a {
    flex: 0 0 auto;
    display: inline-flex;
    align-items: center;
    min-height: 44px;
    padding: 0 var(--s3);
    border: 1px solid var(--hairline);
    border-radius: 999px;
    color: var(--ink);
    font: 600 13px/1 var(--mono);
    text-decoration: none;
    transition: border-color 150ms, background-color 150ms;
  }
  .sizes a:active { background: var(--wash); }

  .bar-actions {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--s3);
    padding: 0 var(--s4) var(--s2);
  }
  .bar-actions-left {
    display: flex;
    align-items: center;
    gap: var(--s3);
  }
  .copy-btn {
    appearance: none;
    border: 1px solid var(--hairline);
    border-radius: 999px;
    background: var(--paper);
    color: var(--ink);
    font: 600 13px/1 var(--sans);
    padding: 0 var(--s4);
    min-height: 44px;
    cursor: pointer;
    transition: border-color 150ms, background-color 150ms;
  }
  .copy-btn:active { background: var(--wash); }
  .copy-btn:focus-visible {
    outline: 2px solid var(--posca-red);
    outline-offset: 2px;
  }
  .copy-status {
    font: 500 13px/1.2 var(--sans);
    color: var(--muted);
  }
  .dirty {
    display: inline-flex;
    align-items: center;
    gap: var(--s1);
    font: 600 13px/1.2 var(--sans);
    color: var(--posca-red);
  }
  .dirty::before {
    content: "";
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--posca-red);
  }
  .dirty[hidden] { display: none; }

  main {
    padding: 0 var(--s4) var(--s8);
    max-width: 720px;
    margin: 0 auto;
  }

  /* Size sections: oversized catalog code as scroll anchor */
  section.size {
    padding-top: var(--s6);
    scroll-margin-top: var(--bar-h);
  }
  section.size + section.size {
    border-top: 1px solid var(--hairline);
    margin-top: var(--s6);
  }
  .size-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: var(--s3);
  }
  .size-code {
    margin: 0;
    font: 800 30px/1.1 var(--mono);
    letter-spacing: -0.02em;
  }
  .size-count {
    font: 500 14px/1.2 var(--mono);
    font-variant-numeric: tabular-nums;
    color: var(--muted);
    white-space: nowrap;
  }
  .size-tip {
    margin: var(--s1) 0 0;
    font-size: 13px;
    color: var(--muted);
  }
  .size-fill {
    height: 3px;
    background: var(--wash);
    border-radius: 2px;
    margin-top: var(--s2);
    overflow: hidden;
  }
  .size-fill i {
    display: block;
    height: 100%;
    background: var(--ink);
    border-radius: 2px;
  }

  .cat-label {
    margin: var(--s4) 0 var(--s2);
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
  }

  /* Swatch grid: density per label mode */
  .grid {
    display: grid;
    gap: 6px;
    grid-template-columns: repeat(auto-fill, minmax(38px, 1fr));
  }
  body[data-mode="nummer"] .grid {
    grid-template-columns: repeat(auto-fill, minmax(48px, 1fr));
  }
  body[data-mode="naam"] .grid {
    grid-template-columns: repeat(auto-fill, minmax(76px, 1fr));
  }

  /* Swatch: owned = solid pigment chip; missing = pale wash + dashed border.
     Dashed border is the second (non-color) channel for the missing state. */
  .sw {
    position: relative;
    display: block;
    width: 100%;
    min-width: 0;
    padding: 0;
    border: 0;
    background: none;
    font: inherit;
    color: inherit;
    text-align: inherit;
    cursor: pointer;
    appearance: none;
  }
  /* Invisible hit-area expansion: keeps chip visual size, widens the
     tappable box toward ~44px without shifting grid layout. */
  .sw::before {
    content: "";
    position: absolute;
    inset: -3px;
  }
  .sw:focus-visible {
    outline: 2px solid var(--posca-red);
    outline-offset: 2px;
  }
  .chip {
    aspect-ratio: 1;
    border-radius: 7px;
    background: var(--c);
    border: 1.5px solid transparent;
    box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.08);
  }
  .sw.missing .chip {
    background: color-mix(in srgb, var(--c) 20%, #fff);
    border: 1.5px dashed #c4c4c4;
    box-shadow: none;
  }

  .sw-num, .sw-name {
    display: none;
    margin-top: 3px;
    text-align: center;
    color: #333;
  }
  .sw.missing .sw-num,
  .sw.missing .sw-name { color: var(--faint); }
  body[data-mode="nummer"] .sw-num { display: block; }
  body[data-mode="naam"] .sw-name { display: block; }
  .sw-num {
    font: 500 11px/1.2 var(--mono);
    font-variant-numeric: tabular-nums;
  }
  .sw-num.num-unknown {
    font-style: italic;
    font-weight: 400;
    color: var(--faint);
  }
  .sw-name {
    font-size: 10px;
    line-height: 1.3;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
</style>
</head>
<body data-mode="kleur">
  <header class="bar">
    <div class="bar-top">
      <h1>Posca voorraad</h1>
      <div class="mode" role="group" aria-label="Labelweergave">
        <button type="button" data-mode-btn="kleur" aria-pressed="true">Kleur</button>
        <button type="button" data-mode-btn="nummer" aria-pressed="false">Nummer</button>
        <button type="button" data-mode-btn="naam" aria-pressed="false">Naam</button>
      </div>
    </div>
    <div class="bar-actions">
      <div class="bar-actions-left">
        <button type="button" id="copy-btn" class="copy-btn">kopieer inventory.js</button>
        <span id="copy-status" class="copy-status" aria-live="polite"></span>
      </div>
      <span id="dirty-indicator" class="dirty" hidden>niet-opgeslagen wijzigingen</span>
    </div>
    <nav class="sizes" aria-label="Ga naar maat"></nav>
  </header>

  <main id="app"></main>

  <script src="lineup.js"></script>
  <script src="inventory.js"></script>
  <script>
    "use strict";

    var CATEGORY_ORDER = ["Standard", "Pastel", "Fluo", "Metallic", "Glitter"];
    var MODES = ["kleur", "nummer", "naam"];
    var MODE_KEY = "posca-label-mode";
    var LS_KEY = "posca-inventory-local";
    var INVENTORY_HEADER = [
      '// Owned markers as lineup.js color keys ("SIZE:Color Name", duplicate names',
      '// carry an ordinal suffix like "3M:Brown-2").',
      "// Updated by tapping in the page (copy button) or via Claude Code."
    ].join("\n");

    // --- Ownership overlay (localStorage), relative to committed INVENTORY ---

    function loadOverlay() {
      try {
        var raw = JSON.parse(localStorage.getItem(LS_KEY));
        if (raw && Array.isArray(raw.added) && Array.isArray(raw.removed)) return raw;
      } catch (e) { /* ignore malformed/missing overlay */ }
      return { added: [], removed: [] };
    }

    function saveOverlay(o) {
      try { localStorage.setItem(LS_KEY, JSON.stringify(o)); }
      catch (e) { /* storage unavailable (private mode, quota) */ }
    }

    function effectiveOwned() {
      var o = loadOverlay();
      var set = new Set(INVENTORY);
      o.added.forEach(function (k) { set.add(k); });
      o.removed.forEach(function (k) { set.delete(k); });
      return set;
    }

    function toggleKey(key) {
      var o = loadOverlay();
      var committed = INVENTORY.indexOf(key) !== -1;
      var owned = effectiveOwned().has(key);
      if (owned) {                       // -> not owned
        o.added = o.added.filter(function (k) { return k !== key; });
        if (committed && o.removed.indexOf(key) === -1) o.removed.push(key);
      } else {                           // -> owned
        o.removed = o.removed.filter(function (k) { return k !== key; });
        if (!committed && o.added.indexOf(key) === -1) o.added.push(key);
      }
      saveOverlay(o);
      render();                          // re-renders swatch states, counters, dirty indicator
    }

    // Drop overlay entries already reflected in the committed INVENTORY
    // (an "added" key that's now committed, or a "removed" key that's now
    // absent) so a freshly pasted inventory.js clears the dirty state.
    function cleanStaleOverlay() {
      var o = loadOverlay();
      var committed = new Set(INVENTORY);
      var added = o.added.filter(function (k) { return !committed.has(k); });
      var removed = o.removed.filter(function (k) { return committed.has(k); });
      if (added.length !== o.added.length || removed.length !== o.removed.length) {
        saveOverlay({ added: added, removed: removed });
      }
    }

    function updateDirtyIndicator() {
      var o = loadOverlay();
      var dirty = (o.added.length + o.removed.length) > 0;
      var indicator = document.getElementById("dirty-indicator");
      if (indicator) indicator.hidden = !dirty;
    }

    // Full inventory.js file content from effectiveOwned(), keys ordered by
    // lineup size order then by name (LINEUP's own color order).
    function generateInventoryJs() {
      var owned = effectiveOwned();
      var keys = [];
      LINEUP.forEach(function (size) {
        size.colors.forEach(function (c) {
          if (owned.has(c.key)) keys.push(c.key);
        });
      });
      if (keys.length === 0) {
        return INVENTORY_HEADER + "\nconst INVENTORY = [];\n";
      }
      var lines = keys.map(function (k) { return "  " + JSON.stringify(k) + ","; });
      return INVENTORY_HEADER + "\nconst INVENTORY = [\n" + lines.join("\n") + "\n];\n";
    }

    function showCopyStatus(text, timeoutMs) {
      var status = document.getElementById("copy-status");
      if (!status) return;
      status.textContent = text;
      if (timeoutMs) {
        window.clearTimeout(status._clearTimer);
        status._clearTimer = window.setTimeout(function () {
          status.textContent = "";
        }, timeoutMs);
      }
    }

    function copyInventory() {
      var text = generateInventoryJs();
      if (!navigator.clipboard || !navigator.clipboard.writeText) {
        showCopyStatus("Kopiëren niet beschikbaar: geen secure context (gebruik file:// of localhost).", 4000);
        return;
      }
      navigator.clipboard.writeText(text).then(function () {
        showCopyStatus("Gekopieerd", 2000);
      }, function () {
        showCopyStatus("Kopiëren mislukt.", 4000);
      });
    }

    // Spectrum sort: greys/browns first by lightness, then hue (spec-fixed).
    function spectrumKey(hex) {
      const r = parseInt(hex.slice(1, 3), 16) / 255,
            g = parseInt(hex.slice(3, 5), 16) / 255,
            b = parseInt(hex.slice(5, 7), 16) / 255;
      const max = Math.max(r, g, b), min = Math.min(r, g, b), l = (max + min) / 2;
      const s = max === min ? 0 : (max - min) / (1 - Math.abs(2 * l - 1));
      let h = 0;
      if (max !== min) {
        if (max === r) h = ((g - b) / (max - min) + 6) % 6;
        else if (max === g) h = (b - r) / (max - min) + 2;
        else h = (r - g) / (max - min) + 4;
        h /= 6;
      }
      return s < 0.12 ? l : 1 + h;  // greys/browns first by lightness, then hue
    }

    function getStoredMode() {
      try {
        var m = localStorage.getItem(MODE_KEY);
        return MODES.indexOf(m) !== -1 ? m : "kleur";
      } catch (e) {
        return "kleur";
      }
    }

    function setMode(mode) {
      document.body.dataset.mode = mode;
      try { localStorage.setItem(MODE_KEY, mode); } catch (e) { /* private mode */ }
      document.querySelectorAll("[data-mode-btn]").forEach(function (btn) {
        btn.setAttribute("aria-pressed", String(btn.dataset.modeBtn === mode));
      });
    }

    function el(tag, className, text) {
      var node = document.createElement(tag);
      if (className) node.className = className;
      if (text !== undefined) node.textContent = text;
      return node;
    }

    function buildNav() {
      var nav = document.querySelector(".sizes");
      LINEUP.forEach(function (size) {
        var link = document.createElement("a");
        link.href = "#size-" + size.size;
        link.textContent = size.size;
        nav.appendChild(link);
      });
    }

    // Re-callable: Task 6 re-renders after toggling INVENTORY entries.
    function render() {
      var owned = effectiveOwned();
      var main = document.getElementById("app");
      main.textContent = "";

      LINEUP.forEach(function (size) {
        var section = el("section", "size");
        section.id = "size-" + size.size;

        var ownedCount = size.colors.reduce(function (acc, c) {
          return acc + (owned.has(c.key) ? 1 : 0);
        }, 0);

        var head = el("div", "size-head");
        var code = el("h2", "size-code", size.label);
        var count = el("span", "size-count", ownedCount + " van " + size.colors.length);
        head.appendChild(code);
        head.appendChild(count);
        section.appendChild(head);
        section.appendChild(el("p", "size-tip", size.tip));

        var fill = el("div", "size-fill");
        var fillBar = el("i");
        fillBar.style.width = (100 * ownedCount / size.colors.length) + "%";
        fill.appendChild(fillBar);
        section.appendChild(fill);

        CATEGORY_ORDER.forEach(function (category) {
          var colors = size.colors
            .filter(function (c) { return c.category === category; })
            .sort(function (a, b) { return spectrumKey(a.hex) - spectrumKey(b.hex); });
          if (colors.length === 0) return;

          section.appendChild(el("h3", "cat-label", category));
          var grid = el("div", "grid");

          colors.forEach(function (color) {
            var isOwned = owned.has(color.key);
            var sw = el("button", "sw " + (isOwned ? "owned" : "missing"));
            sw.type = "button";
            sw.dataset.key = color.key;
            sw.title = color.name + (color.number !== null ? " (" + color.number + ")" : "");
            sw.setAttribute("aria-pressed", String(isOwned));
            sw.style.setProperty("--c", color.hex);
            sw.addEventListener("click", function () { toggleKey(color.key); });

            sw.appendChild(el("div", "chip"));

            var num = el("div", "sw-num" + (color.number === null ? " num-unknown" : ""),
                         color.number === null ? "?" : color.number);
            sw.appendChild(num);

            var name = el("div", "sw-name", color.name);
            name.dataset.full = color.name;
            sw.appendChild(name);

            grid.appendChild(sw);
          });

          section.appendChild(grid);
        });

        main.appendChild(section);
      });

      updateDirtyIndicator();
    }

    document.querySelectorAll("[data-mode-btn]").forEach(function (btn) {
      btn.addEventListener("click", function () { setMode(btn.dataset.modeBtn); });
    });
    document.getElementById("copy-btn").addEventListener("click", copyInventory);

    setMode(getStoredMode());
    buildNav();
    cleanStaleOverlay();
    render();
  </script>
</body>
</html>
