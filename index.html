<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light dark">
<title>Posca inventory</title>
<style>
  /* Token system: paper/ink chrome, one brand-red accent. The 222 official
     pigment hexes are the real palette; everything else stays neutral (both
     themes) so they render uncontaminated. Theme via color-scheme +
     light-dark(): system preference by default, manual override through
     html[data-theme]. */
  :root {
    color-scheme: light dark;
    --paper: light-dark(#ffffff, #161616);
    --ink: light-dark(#141414, #ececec);
    --muted: light-dark(#6b6b6b, #a1a1a1);
    /* Missing-state dashed border: tuned to hold >= 3:1 against the closest
       chip fill in each theme (White wash on light, Black wash on dark). */
    --faint: light-dark(#909090, #7a7a7a);
    --hairline: light-dark(#e6e6e6, #2a2a2a);
    --wash: light-dark(#f5f5f4, #222222);
    /* Brand dot: the literal Posca red in both themes (decorative mark). */
    --posca-red: #e63312;
    /* Functional accent (focus rings, dirty text): deepened in light so 13px
       text passes AA on paper (5.1:1), brightened in dark for contrast on
       near-black surfaces (5.8:1). */
    --accent: light-dark(#d42a0c, #ff5a3c);
    /* Owned-chip edge: dark hairline on light paper, light hairline on dark
       paper, so near-paper pigments keep a visible boundary. */
    --chip-edge: light-dark(rgba(0, 0, 0, 0.12), rgba(255, 255, 255, 0.16));
    /* Idle-control edge: stronger than --hairline so off-state toggles and
       buttons read as interactive, not disabled. */
    --edge: light-dark(#c9c9c7, #4a4a4a);
    /* Missing-state wash: pigment mixed toward the theme's neutral base.
       The base sits off the page surface in dark so even Black (#2d2926)
       reads as a chip, not as background. */
    --missing-base: light-dark(#ffffff, #2b2b2b);
    --missing-keep: 20%;
    --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    /* 4px spacing scale */
    --s1: 4px; --s2: 8px; --s3: 12px; --s4: 16px; --s6: 24px; --s8: 32px;
    /* Measured sticky-bar height (145px: bar-top + actions + sizes + border)
       plus a little air, so size jumps land headings below the bar. */
    --bar-h: 152px;
  }
  /* Darkening desaturates perceived pigment more than lightening does, so the
     missing wash keeps a much larger share of the pigment in dark; 60% keeps
     hues nameable on an empty inventory while the dashed border still marks
     the missing state. (light-dark() only accepts colors, hence the explicit
     dark-scope overrides.) */
  :root[data-theme="light"] { color-scheme: light; }
  :root[data-theme="dark"] {
    color-scheme: dark;
    --missing-keep: 60%;
  }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) { --missing-keep: 60%; }
  }

  * { box-sizing: border-box; }

  html {
    scroll-behavior: smooth;
  }
  @media (prefers-reduced-motion: reduce) {
    html { scroll-behavior: auto; }
    * { transition: none !important; }
  }

  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 16px;
    line-height: 1.5;
    -webkit-text-size-adjust: 100%;
  }

  /* Sticky bar, three rows: title + rare actions (copy, theme), grid display
     controls (label toggles + ownership filter), size jump pills. Ordered by
     how often each row is touched in-store: size jumps sit closest to the
     grid, set-once/at-home actions farthest. */
  .bar {
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--paper);
    border-bottom: 1px solid var(--hairline);
  }
  .bar-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--s3);
    padding: var(--s2) var(--s4) 0;
  }
  .bar h1 {
    margin: 0;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: -0.01em;
    white-space: nowrap;
  }
  .bar-top-actions {
    display: flex;
    align-items: center;
    gap: var(--s2);
    flex-shrink: 0;
  }
  .bar h1::before {
    content: "";
    display: inline-block;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--posca-red);
    margin-right: var(--s2);
  }

  /* Control language: every control in the bar shares one vocabulary.
     - visual height 36px (40px size pills), 13px/600 sans, 150ms transitions
     - every control expands its hit area to >= 44px via an invisible
       ::before inset (same trick the swatches use), keeping the bar compact
       without shrinking touch targets
     - idle state: paper background + ink text + --edge outline, identical
       everywhere, so "off" still reads as tappable
     - "on" state: ink background + paper text, identical everywhere
     All pill-radius, all same border weight, so the whole bar reads as one
     instrument panel instead of three unrelated widgets. */
  .toggle,
  .icon-btn,
  .copy-btn {
    position: relative;
    appearance: none;
    margin: 0;
    background: var(--paper);
    border: 1px solid var(--edge);
    border-radius: 999px;
    color: var(--ink);
    font: 600 13px/1 var(--sans);
    min-height: 36px;
    cursor: pointer;
    transition: background-color 150ms, color 150ms, border-color 150ms;
  }
  .toggle::before,
  .icon-btn::before,
  .copy-btn::before,
  .sizes a::before {
    content: "";
    position: absolute;
    inset: -4px;
  }
  .toggle {
    padding: 0 var(--s3);
    min-width: 44px;
  }
  .toggle[aria-pressed="true"] {
    background: var(--ink);
    border-color: var(--ink);
    color: var(--paper);
  }
  .icon-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 36px;
    padding: 0;
    flex-shrink: 0;
  }
  .icon-btn svg { display: none; }
  .icon-btn[data-mode="auto"] .ic-auto,
  .icon-btn[data-mode="light"] .ic-light,
  .icon-btn[data-mode="dark"] .ic-dark { display: block; }
  .icon-btn:active,
  .toggle:not([aria-pressed="true"]):active { background: var(--wash); }
  /* Ownership filter: one segmented pill in the same control vocabulary
     (36px visual, 13px/600, idle paper + ink, active ink + paper). All three
     states stay visible and any state is one tap away (a cycling button
     would hide two states and cost up to two taps in-store). Not persisted
     by design: every load starts at All. Segments expand their hit area
     vertically only, so adjacent segments never share a tap zone. */
  .seg {
    display: inline-flex;
    background: var(--paper);
    border: 1px solid var(--edge);
    border-radius: 999px;
    flex-shrink: 0;
  }
  .seg-btn {
    position: relative;
    appearance: none;
    margin: 0;
    padding: 0 var(--s3);
    border: 0;
    background: none;
    color: var(--ink);
    font: 600 13px/1 var(--sans);
    min-height: 34px;
    cursor: pointer;
    transition: background-color 150ms, color 150ms;
  }
  .seg-btn::before {
    content: "";
    position: absolute;
    inset: -5px 0;
  }
  .seg-btn:first-child { border-radius: 999px 0 0 999px; }
  .seg-btn:last-child { border-radius: 0 999px 999px 0; }
  .seg-btn + .seg-btn { border-left: 1px solid var(--edge); }
  .seg-btn[aria-pressed="true"] {
    background: var(--ink);
    color: var(--paper);
  }
  .seg-btn:not([aria-pressed="true"]):active { background: var(--wash); }
  .seg-btn:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: -2px;
  }
  .icon-btn:focus-visible,
  .toggle:focus-visible,
  .sizes a:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  .sizes {
    display: flex;
    gap: var(--s2);
    padding: var(--s2) var(--s4) var(--s2);
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .sizes::-webkit-scrollbar { display: none; }
  .sizes a {
    position: relative;
    flex: 0 0 auto;
    display: inline-flex;
    align-items: center;
    min-height: 40px;
    padding: 0 var(--s3);
    border: 1px solid var(--edge);
    border-radius: 999px;
    color: var(--ink);
    font: 600 13px/1 var(--mono);
    text-decoration: none;
    transition: border-color 150ms, background-color 150ms;
  }
  .sizes a:active { background: var(--wash); }

  .bar-actions {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--s3);
    padding: var(--s2) var(--s4) 0;
  }
  .bar-actions-left {
    display: flex;
    align-items: center;
    gap: var(--s2);
  }
  .copy-btn {
    padding: 0 var(--s4);
    white-space: nowrap;
    flex-shrink: 0;
  }
  .copy-btn:active { background: var(--wash); }
  .copy-btn:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }
  /* Dirty state: a small accent dot on the copy button's corner (the action
     that resolves it), with a paper ring so it stays visible on any theme.
     The accessible name change rides on aria-label in updateDirtyIndicator. */
  .copy-btn.dirty::after {
    content: "";
    position: absolute;
    top: -3px;
    right: 5px;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 0 2px var(--paper);
  }
  /* Status floats below the bar so a message never reflows the sticky rows
     (a transient "List copied" must not push the size nav around). */
  .copy-status {
    position: absolute;
    top: calc(100% + var(--s2));
    left: 50%;
    transform: translateX(-50%);
    max-width: calc(100vw - 2 * var(--s4));
    padding: var(--s2) var(--s3);
    background: var(--wash);
    border: 1px solid var(--hairline);
    border-radius: 18px;
    font: 500 13px/1.3 var(--sans);
    color: var(--ink);
    text-align: center;
  }
  .copy-status:empty { display: none; }

  main {
    padding: 0 var(--s4) var(--s8);
    max-width: 720px;
    margin: 0 auto;
  }

  /* Size sections: oversized catalog code as scroll anchor */
  section.size {
    padding-top: var(--s6);
    scroll-margin-top: var(--bar-h);
  }
  section.size + section.size {
    border-top: 1px solid var(--hairline);
    margin-top: var(--s6);
  }
  .size-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: var(--s3);
  }
  .size-code {
    margin: 0;
    font: 800 30px/1.1 var(--mono);
    letter-spacing: -0.02em;
  }
  .size-count {
    font: 500 14px/1.2 var(--mono);
    font-variant-numeric: tabular-nums;
    color: var(--muted);
    white-space: nowrap;
  }
  .size-tip {
    margin: var(--s1) 0 0;
    font-size: 13px;
    color: var(--muted);
  }

  .cat-label {
    margin: var(--s4) 0 var(--s2);
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
  }

  /* Swatch grid: column count is set purely by container width, so it is
     identical across all four label combinations. Row height varies by
     state (density first): both labels off collapses the label area to a
     pure color grid; turning labels on reflows vertically only. */
  .grid {
    display: grid;
    gap: 6px;
    grid-template-columns: repeat(auto-fill, minmax(56px, 1fr));
  }

  /* Swatch: owned = solid pigment chip; missing = neutral-mixed wash + dashed
     border. Dashed border is the second (non-color) channel for the missing
     state, and carries it for pigments near the page surface in either theme. */
  .sw {
    position: relative;
    display: block;
    width: 100%;
    min-width: 0;
    padding: 0;
    border: 0;
    background: none;
    font: inherit;
    color: inherit;
    text-align: inherit;
    cursor: pointer;
    appearance: none;
  }
  /* Invisible hit-area expansion: keeps chip visual size, widens the
     tappable box toward ~44px without shifting grid layout. */
  .sw::before {
    content: "";
    position: absolute;
    inset: -3px;
  }
  .sw:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }
  .chip {
    aspect-ratio: 1;
    border-radius: 7px;
    background: var(--c);
    border: 1.5px solid transparent;
    box-shadow: inset 0 0 0 1px var(--chip-edge);
    transition: transform 120ms cubic-bezier(0.16, 1, 0.3, 1);
  }
  .sw:active .chip { transform: scale(0.92); }
  .sw.missing .chip {
    background: color-mix(in srgb, var(--c) var(--missing-keep), var(--missing-base));
    border: 1.5px dashed var(--faint);
    box-shadow: none;
  }

  /* Label area: collapsed entirely when both toggles are off (pure dense
     color grid). Each visible line has a fixed height (number 14px, name a
     fixed 2-line box), so within any one toggle state every row of the grid
     is the same height; no per-row raggedness. */
  .sw-label {
    margin-top: 3px;
    overflow: hidden;
  }
  body:not([data-show-number]):not([data-show-name]) .sw-label {
    display: none;
  }
  .sw-num, .sw-name {
    display: none;
    text-align: center;
    color: var(--ink);
  }
  .sw.missing .sw-num,
  .sw.missing .sw-name { color: var(--muted); }
  body[data-show-number] .sw-num { display: block; }
  .sw-num {
    font: 500 11px/14px var(--mono);
    font-variant-numeric: tabular-nums;
  }
  .sw-num.num-unknown {
    font-style: italic;
    font-weight: 400;
    color: var(--muted);
  }
  /* Names wrap to at most two lines (never mid-word); anything longer gets
     an ellipsis. The box is always exactly two lines tall in name-on states
     so label height stays constant across cells. */
  .sw-name {
    font-size: 11px;
    line-height: 13px;
    height: 26px;
    overflow: hidden;
    text-overflow: ellipsis;
    -webkit-box-orient: vertical;
    -webkit-line-clamp: 2;
  }
  body[data-show-name] .sw-name { display: -webkit-box; }
</style>
<script>
  // Apply a stored manual theme before first paint (auto = no attribute).
  try {
    var storedTheme = localStorage.getItem("posca-theme");
    if (storedTheme === "light" || storedTheme === "dark") {
      document.documentElement.dataset.theme = storedTheme;
    }
  } catch (e) { /* private mode */ }
</script>
</head>
<body>
  <header class="bar">
    <div class="bar-top">
      <h1>Posca inventory</h1>
      <div class="bar-top-actions">
      <button type="button" id="copy-btn" class="copy-btn">Copy updated list</button>
      <button type="button" id="theme-btn" class="icon-btn" data-mode="auto">
        <svg class="ic-auto" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <circle cx="12" cy="12" r="9"></circle>
          <path d="M12 3a9 9 0 0 1 0 18z" fill="currentColor" stroke="none"></path>
        </svg>
        <svg class="ic-light" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
          <circle cx="12" cy="12" r="4" fill="currentColor" stroke="none"></circle>
          <path d="M12 2.5v3M12 18.5v3M2.5 12h3M18.5 12h3M5.3 5.3l2.1 2.1M16.6 16.6l2.1 2.1M18.7 5.3l-2.1 2.1M7.4 16.6l-2.1 2.1"></path>
        </svg>
        <svg class="ic-dark" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M20.5 14.5A8.5 8.5 0 0 1 9.5 3.5a8.5 8.5 0 1 0 11 11z"></path>
        </svg>
      </button>
      </div>
    </div>
    <div class="bar-actions">
      <div class="bar-actions-left" role="group" aria-label="Swatch labels">
        <button type="button" class="toggle" data-label-btn="number" aria-pressed="false">Number</button>
        <button type="button" class="toggle" data-label-btn="name" aria-pressed="false">Name</button>
      </div>
      <div class="seg" role="group" aria-label="Filter by ownership">
        <button type="button" class="seg-btn" data-filter-btn="all" aria-pressed="true">All</button>
        <button type="button" class="seg-btn" data-filter-btn="owned" aria-pressed="false">Owned</button>
        <button type="button" class="seg-btn" data-filter-btn="missing" aria-pressed="false">Missing</button>
      </div>
    </div>
    <nav class="sizes" aria-label="Jump to size"></nav>
    <span id="copy-status" class="copy-status" aria-live="polite"></span>
  </header>

  <main id="app"></main>

  <script src="lineup.js"></script>
  <script src="inventory.js"></script>
  <script>
    "use strict";

    var CATEGORY_ORDER = ["Standard", "Pastel", "Fluo", "Metallic", "Glitter"];
    var LABELS_KEY = "posca-labels";
    var LEGACY_LABELS_KEY = "posca-label-mode";  // round-1/2 single-mode value
    var LEGACY_LABEL_MAP = {
      color: { number: false, name: false }, kleur: { number: false, name: false },
      number: { number: true, name: false }, nummer: { number: true, name: false },
      name: { number: false, name: true }, naam: { number: false, name: true }
    };
    var THEMES = ["auto", "light", "dark"];
    // In-store quick filter over ownership. Deliberately not persisted:
    // every load starts at "all".
    var OWN_FILTERS = ["all", "owned", "missing"];
    var ownFilter = "all";
    var THEME_KEY = "posca-theme";
    var LS_KEY = "posca-inventory-local";
    var INVENTORY_HEADER = [
      '// Owned markers as lineup.js color keys ("SIZE:Color Name", duplicate names',
      '// carry an ordinal suffix like "3M:Brown-2").',
      "// Updated by tapping in the page (copy button) or via Claude Code."
    ].join("\n");

    // --- Ownership overlay (localStorage), relative to committed INVENTORY ---

    function loadOverlay() {
      try {
        var raw = JSON.parse(localStorage.getItem(LS_KEY));
        if (raw && Array.isArray(raw.added) && Array.isArray(raw.removed)) return raw;
      } catch (e) { /* ignore malformed/missing overlay */ }
      return { added: [], removed: [] };
    }

    function saveOverlay(o) {
      try { localStorage.setItem(LS_KEY, JSON.stringify(o)); }
      catch (e) { /* storage unavailable (private mode, quota) */ }
    }

    function effectiveOwned() {
      var o = loadOverlay();
      var set = new Set(INVENTORY);
      o.added.forEach(function (k) { set.add(k); });
      o.removed.forEach(function (k) { set.delete(k); });
      return set;
    }

    function toggleKey(key) {
      var o = loadOverlay();
      var committed = INVENTORY.indexOf(key) !== -1;
      var owned = effectiveOwned().has(key);
      if (owned) {                       // -> not owned
        o.added = o.added.filter(function (k) { return k !== key; });
        if (committed && o.removed.indexOf(key) === -1) o.removed.push(key);
      } else {                           // -> owned
        o.removed = o.removed.filter(function (k) { return k !== key; });
        if (!committed && o.added.indexOf(key) === -1) o.added.push(key);
      }
      saveOverlay(o);
      render();                          // re-renders swatch states, counters, dirty indicator
    }

    // Drop overlay entries already reflected in the committed INVENTORY
    // (an "added" key that's now committed, or a "removed" key that's now
    // absent) so a freshly pasted inventory.js clears the dirty state. Also
    // drop overlay entries whose key no longer exists in LINEUP at all —
    // e.g. a color a data correction renamed (2026-07-24 Task N6: "3M:Brown-2"
    // -> "3M:Dark Brown", "5M:Coral" -> "5M:Coral Pink", "5BR:Coral" ->
    // "5BR:Coral Pink", "5M:Yellow Fluo" -> "5M:Fluorescent Yellow") would
    // otherwise leave an orphaned local tick and a permanently stuck dirty dot.
    function cleanStaleOverlay() {
      var o = loadOverlay();
      var committed = new Set(INVENTORY);
      var validKeys = new Set();
      LINEUP.forEach(function (size) {
        size.colors.forEach(function (c) { validKeys.add(c.key); });
      });
      var added = o.added.filter(function (k) { return !committed.has(k) && validKeys.has(k); });
      var removed = o.removed.filter(function (k) { return committed.has(k) && validKeys.has(k); });
      if (added.length !== o.added.length || removed.length !== o.removed.length) {
        saveOverlay({ added: added, removed: removed });
      }
    }

    function updateDirtyIndicator() {
      var o = loadOverlay();
      var dirty = (o.added.length + o.removed.length) > 0;
      var btn = document.getElementById("copy-btn");
      if (!btn) return;
      btn.classList.toggle("dirty", dirty);
      if (dirty) btn.setAttribute("aria-label", "Copy updated list (unsaved changes)");
      else btn.removeAttribute("aria-label");
    }

    // Full inventory.js file content from effectiveOwned(), keys ordered by
    // lineup size order then by name (LINEUP's own color order).
    function generateInventoryJs() {
      var owned = effectiveOwned();
      var keys = [];
      LINEUP.forEach(function (size) {
        size.colors.forEach(function (c) {
          if (owned.has(c.key)) keys.push(c.key);
        });
      });
      if (keys.length === 0) {
        return INVENTORY_HEADER + "\nconst INVENTORY = [];\n";
      }
      var lines = keys.map(function (k) { return "  " + JSON.stringify(k) + ","; });
      return INVENTORY_HEADER + "\nconst INVENTORY = [\n" + lines.join("\n") + "\n];\n";
    }

    function showCopyStatus(text, timeoutMs) {
      var status = document.getElementById("copy-status");
      if (!status) return;
      status.textContent = text;
      if (timeoutMs) {
        window.clearTimeout(status._clearTimer);
        status._clearTimer = window.setTimeout(function () {
          status.textContent = "";
        }, timeoutMs);
      }
    }

    function copyInventory() {
      var text = generateInventoryJs();
      if (!navigator.clipboard || !navigator.clipboard.writeText) {
        showCopyStatus("Copying is blocked here. Open the page locally or over https.", 4000);
        return;
      }
      navigator.clipboard.writeText(text).then(function () {
        showCopyStatus("List copied. Paste it over the old list at home.", 3000);
      }, function () {
        showCopyStatus("Copy failed. Try again.", 4000);
      });
    }

    // Spectrum sort: greys/browns first by lightness, then hue (spec-fixed).
    function spectrumKey(hex) {
      const r = parseInt(hex.slice(1, 3), 16) / 255,
            g = parseInt(hex.slice(3, 5), 16) / 255,
            b = parseInt(hex.slice(5, 7), 16) / 255;
      const max = Math.max(r, g, b), min = Math.min(r, g, b), l = (max + min) / 2;
      const s = max === min ? 0 : (max - min) / (1 - Math.abs(2 * l - 1));
      let h = 0;
      if (max !== min) {
        if (max === r) h = ((g - b) / (max - min) + 6) % 6;
        else if (max === g) h = (b - r) / (max - min) + 2;
        else h = (r - g) / (max - min) + 4;
        h /= 6;
      }
      return s < 0.12 ? l : 1 + h;  // greys/browns first by lightness, then hue
    }

    // Labels are two independent booleans (Number, Name). Stored as JSON under
    // LABELS_KEY; a round-1/2 single-mode value migrates once and is removed.
    // Anything unreadable falls back to both off (pure color grid).
    function getStoredLabels() {
      var off = { number: false, name: false };
      try {
        var raw = localStorage.getItem(LABELS_KEY);
        if (raw !== null) {
          var parsed = JSON.parse(raw);
          if (parsed && typeof parsed.number === "boolean" && typeof parsed.name === "boolean") {
            return { number: parsed.number, name: parsed.name };
          }
          return off;
        }
        var legacy = LEGACY_LABEL_MAP[localStorage.getItem(LEGACY_LABELS_KEY)];
        localStorage.removeItem(LEGACY_LABELS_KEY);
        if (legacy) {
          localStorage.setItem(LABELS_KEY, JSON.stringify(legacy));
          return legacy;
        }
        return off;
      } catch (e) {
        return off;
      }
    }

    function setLabels(labels) {
      if (labels.number) document.body.dataset.showNumber = "";
      else delete document.body.dataset.showNumber;
      if (labels.name) document.body.dataset.showName = "";
      else delete document.body.dataset.showName;
      try { localStorage.setItem(LABELS_KEY, JSON.stringify(labels)); }
      catch (e) { /* private mode */ }
      document.querySelectorAll("[data-label-btn]").forEach(function (btn) {
        btn.setAttribute("aria-pressed", String(labels[btn.dataset.labelBtn]));
      });
    }

    function currentLabels() {
      return {
        number: document.body.dataset.showNumber !== undefined,
        name: document.body.dataset.showName !== undefined
      };
    }

    function setOwnFilter(filter) {
      if (OWN_FILTERS.indexOf(filter) === -1) return;
      ownFilter = filter;
      document.querySelectorAll("[data-filter-btn]").forEach(function (btn) {
        btn.setAttribute("aria-pressed", String(btn.dataset.filterBtn === filter));
      });
      render();
    }

    function getStoredTheme() {
      try {
        var t = localStorage.getItem(THEME_KEY);
        return THEMES.indexOf(t) !== -1 ? t : "auto";
      } catch (e) {
        return "auto";
      }
    }

    function nextTheme(theme) {
      return THEMES[(THEMES.indexOf(theme) + 1) % THEMES.length];
    }

    function setTheme(theme) {
      if (theme === "auto") {
        delete document.documentElement.dataset.theme;
      } else {
        document.documentElement.dataset.theme = theme;
      }
      try { localStorage.setItem(THEME_KEY, theme); } catch (e) { /* private mode */ }
      var btn = document.getElementById("theme-btn");
      if (btn) {
        btn.dataset.mode = theme;
        var text = "Theme: " + theme + ". Tap for " + nextTheme(theme) + ".";
        btn.setAttribute("aria-label", text);
        btn.title = text;
      }
    }

    function el(tag, className, text) {
      var node = document.createElement(tag);
      if (className) node.className = className;
      if (text !== undefined) node.textContent = text;
      return node;
    }

    function buildNav() {
      var nav = document.querySelector(".sizes");
      LINEUP.forEach(function (size) {
        var link = document.createElement("a");
        link.href = "#size-" + size.size;
        link.textContent = size.size;
        nav.appendChild(link);
      });
    }

    // Re-callable: Task 6 re-renders after toggling INVENTORY entries.
    function render() {
      var owned = effectiveOwned();
      var main = document.getElementById("app");
      main.textContent = "";

      LINEUP.forEach(function (size) {
        var section = el("section", "size");
        section.id = "size-" + size.size;

        var ownedCount = size.colors.reduce(function (acc, c) {
          return acc + (owned.has(c.key) ? 1 : 0);
        }, 0);

        // Counter always reflects the full size ("N of M"), independent of
        // the ownership filter, so context stays when a section empties out.
        var head = el("div", "size-head");
        var code = el("h2", "size-code", size.label);
        var count = el("span", "size-count", ownedCount + " of " + size.colors.length);
        head.appendChild(code);
        head.appendChild(count);
        section.appendChild(head);

        // A size emptied by the filter keeps only its header + counter.
        var visibleInSize = ownFilter === "owned" ? ownedCount
          : ownFilter === "missing" ? size.colors.length - ownedCount
          : size.colors.length;
        if (visibleInSize > 0) section.appendChild(el("p", "size-tip", size.tip));

        CATEGORY_ORDER.forEach(function (category) {
          var colors = size.colors
            .filter(function (c) {
              if (c.category !== category) return false;
              if (ownFilter === "owned") return owned.has(c.key);
              if (ownFilter === "missing") return !owned.has(c.key);
              return true;
            })
            .sort(function (a, b) { return spectrumKey(a.hex) - spectrumKey(b.hex); });
          if (colors.length === 0) return;

          section.appendChild(el("h3", "cat-label", category));
          var grid = el("div", "grid");

          colors.forEach(function (color) {
            var isOwned = owned.has(color.key);
            var sw = el("button", "sw " + (isOwned ? "owned" : "missing"));
            sw.type = "button";
            sw.dataset.key = color.key;
            sw.title = color.name + (color.number !== null ? " (" + color.number + ")" : "");
            sw.setAttribute("aria-pressed", String(isOwned));
            sw.style.setProperty("--c", color.hex);
            sw.addEventListener("click", function () { toggleKey(color.key); });

            sw.appendChild(el("div", "chip"));

            var label = el("div", "sw-label");
            var num = el("div", "sw-num" + (color.number === null ? " num-unknown" : ""),
                         color.number === null ? "?" : color.number);
            label.appendChild(num);

            var name = el("div", "sw-name", color.name);
            name.dataset.full = color.name;
            label.appendChild(name);
            sw.appendChild(label);

            grid.appendChild(sw);
          });

          section.appendChild(grid);
        });

        main.appendChild(section);
      });

      updateDirtyIndicator();
    }

    document.querySelectorAll("[data-label-btn]").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var labels = currentLabels();
        labels[btn.dataset.labelBtn] = !labels[btn.dataset.labelBtn];
        setLabels(labels);
      });
    });
    document.querySelectorAll("[data-filter-btn]").forEach(function (btn) {
      btn.addEventListener("click", function () { setOwnFilter(btn.dataset.filterBtn); });
    });
    document.getElementById("theme-btn").addEventListener("click", function () {
      setTheme(nextTheme(document.getElementById("theme-btn").dataset.mode));
    });
    document.getElementById("copy-btn").addEventListener("click", copyInventory);

    setLabels(getStoredLabels());
    setTheme(getStoredTheme());
    buildNav();
    cleanStaleOverlay();
    render();
  </script>
</body>
</html>
