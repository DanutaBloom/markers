<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Markers</title>
<script>
  // Set theme before any rendering to prevent flash.
  // Order: stored preference → system preference → light fallback.
  (function() {
    try {
      var stored = localStorage.getItem('copic-theme');
      var theme;
      if (stored === 'light' || stored === 'dark') {
        theme = stored;
      } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
        theme = 'dark';
      } else {
        theme = 'light';
      }
      document.documentElement.setAttribute('data-theme', theme);
    } catch(e) {
      document.documentElement.setAttribute('data-theme', 'light');
    }
  })();
</script>
<style>
  :root {
    --s-1: 4px;   --s-2: 8px;   --s-3: 12px;  --s-4: 16px;
    --s-5: 24px;  --s-6: 32px;  --s-7: 48px;  --s-8: 64px;  --s-9: 96px;
    --r-1: 4px;   --r-2: 8px;   --r-3: 12px;  --r-4: 16px;
    --r-5: 20px;  --r-full: 999px;
    --fs-xs: 11px;  --fs-sm: 12px;  --fs-md: 14px;  --fs-lg: 16px;
    --fs-xl: 20px;  --fs-2xl: 28px; --fs-3xl: 48px;
    --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    --font-mono: ui-monospace, 'SF Mono', SFMono-Regular, Menlo, Consolas, monospace;
    --font-serif: ui-serif, Georgia, 'Times New Roman', serif;
    --ease: cubic-bezier(0.32, 0.72, 0, 1);
    --ease-spring: cubic-bezier(0.16, 1, 0.3, 1);
    --dur-fast: 0.2s;
    --dur: 0.3s;
  }

  :root[data-theme="light"] {
    --bg: #faf9f5;
    --bg-elevated: #ffffff;
    --bg-subtle: #f4f2eb;
    --text: #141413;
    --text-muted: #5a5854;
    --text-soft: #8a8780;
    --border: rgba(20, 20, 19, 0.08);
    --border-strong: rgba(20, 20, 19, 0.16);
    --accent: #d97757;
    --accent-soft: rgba(217, 119, 87, 0.12);
    --owned: #788c5d;
    --missing: #b8642f;
    --ink: #141413;
    --shadow-1: 0 1px 2px rgba(20, 20, 19, 0.04), 0 8px 24px rgba(20, 20, 19, 0.04);
    --shadow-2: 0 1px 2px rgba(20, 20, 19, 0.06), 0 12px 32px rgba(20, 20, 19, 0.06);
    --toolbar-bg: rgba(250, 249, 245, 0.72);
  }

  :root[data-theme="dark"] {
    --bg: #141413;
    --bg-elevated: #1c1c1a;
    --bg-subtle: #232321;
    --text: #faf9f5;
    --text-muted: #b0aea5;
    --text-soft: #7a7872;
    --border: rgba(250, 249, 245, 0.08);
    --border-strong: rgba(250, 249, 245, 0.18);
    --accent: #e89074;
    --accent-soft: rgba(232, 144, 116, 0.16);
    --owned: #9eb47a;
    --missing: #d29260;
    --ink: #faf9f5;
    --shadow-1: 0 1px 2px rgba(0, 0, 0, 0.3), 0 8px 24px rgba(0, 0, 0, 0.3);
    --shadow-2: 0 1px 2px rgba(0, 0, 0, 0.4), 0 12px 32px rgba(0, 0, 0, 0.4);
    --toolbar-bg: rgba(20, 20, 19, 0.72);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: auto; }

  body {
    font-family: var(--font-sans);
    background: var(--bg);
    color: var(--text);
    padding: var(--s-5) var(--s-6) var(--s-8);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    -webkit-text-size-adjust: 100%;
    overscroll-behavior-y: none;
    transition: background var(--dur) var(--ease), color var(--dur) var(--ease);
  }

  .container { max-width: 1200px; margin: 0 auto; }

  /* ═══════ Sticky toolbar ═══════ */
  .toolbar {
    position: sticky;
    top: 0;
    z-index: 50;
    margin: 0 calc(-1 * var(--s-6)) var(--s-6);
    padding: var(--s-2) var(--s-6);
    background: var(--toolbar-bg);
    backdrop-filter: saturate(140%) blur(12px);
    -webkit-backdrop-filter: saturate(140%) blur(12px);
    border-bottom: 1px solid var(--border);
  }
  /* Disable backdrop blur on mobile - it's a major perf hit on iOS */
  @media (max-width: 700px) {
    .toolbar {
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
      background: var(--bg);
    }
  }
  .toolbar-row {
    display: flex;
    align-items: center;
    gap: 2px;
    justify-content: flex-end;
  }
  .toolbar-divider {
    width: 1px;
    height: 18px;
    background: var(--border-strong);
    margin: 0 6px;
    flex-shrink: 0;
  }

  /* Ghost icon-button */
  .ghost-btn {
    width: 36px;
    height: 36px;
    background: transparent;
    color: var(--text-muted);
    border: 1px solid transparent;
    border-radius: var(--r-2);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: background var(--dur) var(--ease), color var(--dur) var(--ease);
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .ghost-btn svg { width: 16px; height: 16px; }
  .ghost-btn:hover {
    background: var(--bg-subtle);
    color: var(--text);
  }
  .ghost-btn:active { transform: scale(0.94); }
  .ghost-btn[aria-pressed="true"] {
    background: var(--ink);
    color: var(--bg);
  }
  .ghost-btn[aria-pressed="true"]:hover {
    background: var(--ink);
    opacity: 0.88;
  }
  .visually-hidden {
    position: absolute;
    width: 1px; height: 1px;
    padding: 0; margin: -1px;
    overflow: hidden; clip: rect(0,0,0,0);
    white-space: nowrap; border: 0;
  }
  .skip-link {
    position: absolute;
    top: var(--s-3); left: var(--s-3);
    padding: var(--s-2) var(--s-4);
    background: var(--bg-elevated);
    color: var(--text);
    border: 1px solid var(--border-strong);
    border-radius: var(--r-2);
    text-decoration: none;
    font-size: var(--fs-sm);
    font-weight: 500;
    transform: translateY(-200%);
    transition: transform var(--dur-fast) var(--ease);
    z-index: 100;
  }
  .skip-link:focus { transform: translateY(0); outline: 2px solid var(--accent); }

  /* Search wrap: button + expanding field */
  .search-wrap {
    position: relative;
    display: flex;
    align-items: center;
    margin-right: auto;
  }
  .search-wrap[data-open="true"] #searchToggle { display: none; }
  .search-wrap .search-field {
    display: none;
    position: relative;
    width: 320px;
  }
  .search-wrap[data-open="true"] .search-field { display: block; }
  .search-field input {
    width: 100%;
    background: var(--bg-elevated);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: var(--r-full);
    padding: 8px 36px 8px 38px;
    font-family: var(--font-sans);
    font-size: var(--fs-sm);
    transition: border-color var(--dur) var(--ease), box-shadow var(--dur) var(--ease);
    height: 36px;
  }
  .search-field input:focus {
    outline: none;
    border-color: var(--border-strong);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  .search-field input::placeholder { color: var(--text-soft); }
  .search-field input::-webkit-search-cancel-button { -webkit-appearance: none; }
  .search-field .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    width: 16px;
    height: 16px;
    color: var(--text-soft);
    pointer-events: none;
  }
  .search-field .clear-search {
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    background: var(--bg-subtle);
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    width: 22px;
    height: 22px;
    border-radius: var(--r-full);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background var(--dur) var(--ease), color var(--dur) var(--ease);
  }
  .search-field .clear-search:hover {
    background: var(--border-strong);
    color: var(--text);
  }

  /* ═══════ Filter dimming (compositor-only, no filter property) ═══════ */
  /* Dim non-matching swatches but keep them clickable so users can toggle
     ownership in any view without switching back to "All" first. */
  body[data-filter="owned"] .mini.missing,
  body[data-filter="owned"] .swatch.missing,
  body[data-filter="missing"] .mini.owned,
  body[data-filter="missing"] .swatch.owned {
    opacity: 0.32;
  }
  :root[data-theme="dark"] body[data-filter="owned"] .mini.missing,
  :root[data-theme="dark"] body[data-filter="owned"] .swatch.missing,
  :root[data-theme="dark"] body[data-filter="missing"] .mini.owned,
  :root[data-theme="dark"] body[data-filter="missing"] .swatch.owned {
    opacity: 0.36;
  }

  /* ═══════ Search highlighting (avoid filter property) ═══════ */
  body.searching .mini:not(.match),
  body.searching .swatch:not(.match) {
    opacity: 0.28;
  }
  body.searching .mini.match,
  body.searching .swatch.match {
    box-shadow: 0 0 0 2px var(--accent);
    z-index: 4;
  }

  /* ═══════ Carousel ═══════ */
  .carousel-section {
    margin: 0 0 var(--s-7);
    overflow: hidden;
  }
  .carousel-header {
    display: flex;
    align-items: center;
    gap: var(--s-4);
    margin-bottom: var(--s-5);
  }
  .arrow-btn {
    flex-shrink: 0;
    width: 36px;
    height: 36px;
    border-radius: var(--r-full);
    background: var(--bg-elevated);
    color: var(--text);
    border: 1px solid var(--border);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s var(--ease), border-color var(--dur) var(--ease), background var(--dur) var(--ease);
  }
  .arrow-btn svg { width: 16px; height: 16px; stroke-width: 2.25; }
  .arrow-btn:hover {
    border-color: var(--border-strong);
    background: var(--bg-subtle);
  }
  .arrow-btn:active { transform: scale(0.92); }
  .carousel-title {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .carousel-title h2 {
    font-size: var(--fs-2xl);
    font-weight: 600;
    letter-spacing: -0.02em;
    line-height: 1;
    color: var(--text);
  }
  .carousel-progress {
    height: 3px;
    background: var(--bg-subtle);
    border-radius: var(--r-full);
    overflow: hidden;
    max-width: 280px;
  }
  .carousel-progress-fill {
    height: 100%;
    background: var(--owned);
    border-radius: var(--r-full);
    transition: width 0.5s var(--ease-spring);
  }
  .carousel-meta {
    flex-shrink: 0;
    font-family: var(--font-mono);
    font-size: var(--fs-md);
    color: var(--text-muted);
    font-feature-settings: "tnum";
    letter-spacing: -0.02em;
  }
  .carousel-meta strong {
    color: var(--text);
    font-weight: 600;
  }
  .carousel-track {
    display: flex;
    transition: transform 0.35s var(--ease-spring);
  }
  .carousel-slide {
    flex: 0 0 100%;
    min-width: 0;
    padding: 4px;
  }
  .carousel-slide:not(.active) {
    pointer-events: none;
    /* Hint to browser that off-screen slides don't need painting */
    content-visibility: auto;
    contain-intrinsic-size: 1px 600px;
  }
  .carousel-slide.active { pointer-events: auto; }

  /* Filter pills (in carousel header) */
  .filter-group {
    display: inline-flex;
    background: var(--bg-subtle);
    padding: 3px;
    border-radius: var(--r-full);
    border: 1px solid var(--border);
    gap: 2px;
    height: 32px;
    flex-shrink: 0;
  }
  .filter-pill {
    display: inline-flex;
    align-items: center;
    padding: 0 12px;
    height: 24px;
    background: transparent;
    color: var(--text-muted);
    border: none;
    border-radius: var(--r-full);
    font-family: var(--font-sans);
    font-size: var(--fs-xs);
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s var(--ease), color 0.2s var(--ease);
    white-space: nowrap;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .filter-pill:hover { color: var(--text); }
  .filter-pill.active {
    background: var(--bg-elevated);
    color: var(--text);
    box-shadow: 0 1px 2px rgba(20, 20, 19, 0.08);
    font-weight: 600;
  }
  :root[data-theme="dark"] .filter-pill.active {
    box-shadow: 0 1px 2px rgba(0, 0, 0, 0.35);
  }

  /* Family navigation chips */
  .family-nav {
    display: flex;
    align-items: center;
    gap: 2px;
    overflow-x: auto;
    overflow-y: hidden;
    scrollbar-width: none;
    margin: 0 calc(-1 * var(--s-6)) var(--s-4);
    padding: 0 var(--s-6) var(--s-3);
    border-bottom: 1px solid var(--border);
    -webkit-overflow-scrolling: touch;
  }
  .family-nav::-webkit-scrollbar { display: none; }
  .chip {
    flex-shrink: 0;
    background: transparent;
    border: none;
    color: var(--text-muted);
    padding: 0 10px;
    height: 28px;
    border-radius: 7px;
    font-family: var(--font-mono);
    font-size: var(--fs-xs);
    font-weight: 500;
    cursor: pointer;
    transition: background var(--dur) var(--ease), color var(--dur) var(--ease);
    letter-spacing: -0.02em;
    display: inline-flex;
    align-items: center;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .chip:hover {
    background: var(--bg-subtle);
    color: var(--text);
  }
  .chip.active {
    background: var(--ink);
    color: var(--bg);
    font-weight: 600;
  }
  .chip-divider {
    flex-shrink: 0;
    width: 1px;
    height: 16px;
    background: var(--border-strong);
    margin: 0 6px;
  }

  /* ═══════ Spectrum strip ═══════ */
  .spectrum-strip {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(44px, 1fr));
    gap: 3px;
  }
  .mini {
    aspect-ratio: 1 / 1;
    border-radius: 5px;
    position: relative;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-sans);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: -0.02em;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    /* 5-point polygon at the top-right corner so clip-path can animate
       into the .owned notch without a geometric jump on toggle. */
    clip-path: polygon(0 0, 100% 0, 100% 0, 100% 100%, 0 100%);
    transition:
      transform 0.35s var(--ease-spring),
      clip-path 0.35s var(--ease-spring),
      box-shadow 0.2s var(--ease),
      opacity 0.2s var(--ease);
    box-shadow: inset 0 0 0 1px rgba(0,0,0,0.04);
  }
  /* Hover only on devices that actually support it */
  @media (hover: hover) {
    .mini:hover {
      transform: scale(1.08);
      z-index: 5;
      box-shadow: 0 6px 16px rgba(20, 20, 19, 0.18), inset 0 0 0 1px rgba(0,0,0,0.08);
    }
    :root[data-theme="dark"] .mini:hover {
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.5), inset 0 0 0 1px rgba(255,255,255,0.08);
    }
    .mini:hover .mini-label { opacity: 1; }
  }
  /* Quick press in, then the base transition springs it back out */
  .mini:active {
    transform: scale(0.94);
    transition: transform 0.08s var(--ease);
  }
  .mini:focus-visible {
    outline: 2px solid var(--ink);
    outline-offset: 3px;
    z-index: 6;
  }
  .mini.owned {
    clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 0 100%);
  }
  .mini.owned::after {
    content: '';
    position: absolute;
    inset: 0;
    box-shadow: inset 0 0 0 1px rgba(0,0,0,0.06);
    pointer-events: none;
  }
  .mini-label {
    line-height: 1;
    text-shadow: 0 1px 1px rgba(0,0,0,0.25);
    opacity: 1;
    transition: opacity var(--dur) var(--ease);
  }
  body.hide-codes .mini-label { opacity: 0; }

  /* ═══════ Family grid (swatches) ═══════ */
  .family-slide { padding: 4px; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(108px, 1fr));
    gap: 6px;
  }
  .swatch {
    padding: 10px var(--s-3);
    border-radius: 8px;
    position: relative;
    aspect-ratio: 1.4 / 1;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    /* 5-point polygon so the .owned corner notch animates instead of jumping */
    clip-path: polygon(0 0, 100% 0, 100% 0, 100% 100%, 0 100%);
    transition:
      transform 0.35s var(--ease-spring),
      clip-path 0.35s var(--ease-spring),
      box-shadow 0.2s var(--ease),
      opacity 0.2s var(--ease);
    box-shadow: inset 0 0 0 1px rgba(0,0,0,0.04);
  }
  @media (hover: hover) {
    .swatch:hover {
      transform: translateY(-2px) scale(1.02);
      z-index: 2;
      box-shadow: 0 8px 24px rgba(20, 20, 19, 0.15), inset 0 0 0 1px rgba(0,0,0,0.06);
    }
    :root[data-theme="dark"] .swatch:hover {
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4), inset 0 0 0 1px rgba(255,255,255,0.06);
    }
  }
  /* Quick press in, then base transition springs it back */
  .swatch:active {
    transform: scale(0.96);
    transition: transform 0.08s var(--ease);
  }
  .swatch:focus-visible {
    outline: 2px solid var(--ink);
    outline-offset: 3px;
  }
  .swatch.owned {
    clip-path: polygon(0 0, calc(100% - 14px) 0, 100% 14px, 100% 100%, 0 100%);
  }
  .swatch.owned::after {
    content: '';
    position: absolute;
    inset: 0;
    box-shadow: inset 0 0 0 1px rgba(0,0,0,0.06);
    pointer-events: none;
  }
  .swatch-code {
    font-family: var(--font-mono);
    font-size: var(--fs-sm);
    font-weight: 600;
    letter-spacing: -0.02em;
    line-height: 1;
  }
  .swatch-name {
    font-size: 10px;
    font-weight: 500;
    line-height: 1.25;
    margin-top: auto;
    opacity: 0.85;
    overflow: hidden;
    text-overflow: ellipsis;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }

  /* ═══════ Empty state ═══════ */
  .empty-state {
    display: none;
    padding: var(--s-7) var(--s-4);
    text-align: center;
    color: var(--text-muted);
    font-size: var(--fs-sm);
    line-height: 1.6;
  }
  .empty-state strong {
    color: var(--text);
    font-weight: 600;
    display: block;
    margin-bottom: 4px;
  }
  body.empty-active .carousel-track { display: none; }
  body.empty-active .empty-state { display: block; }

  /* ═══════ Toast ═══════ */
  .toast {
    position: fixed;
    bottom: var(--s-5);
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--ink);
    color: var(--bg);
    padding: 10px 16px;
    border-radius: var(--r-full);
    font-family: var(--font-sans);
    font-size: var(--fs-sm);
    font-weight: 500;
    box-shadow: var(--shadow-2);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s var(--ease), transform 0.25s var(--ease-spring), bottom var(--dur) var(--ease);
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 10px;
    white-space: nowrap;
    max-width: calc(100vw - 32px);
  }
  .toast.visible {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  .toast .toast-dot {
    width: 8px;
    height: 8px;
    border-radius: var(--r-full);
    background: var(--owned);
    flex-shrink: 0;
  }
  .toast.removed .toast-dot { background: var(--missing); }
  .toast .toast-text {
    overflow: hidden;
    text-overflow: ellipsis;
  }
  body.has-scroll-top .toast { bottom: calc(var(--s-5) + 56px); }

  /* ═══════ Scroll-to-top ═══════ */
  .scroll-top {
    position: fixed;
    bottom: var(--s-5);
    right: var(--s-5);
    width: 40px;
    height: 40px;
    border-radius: var(--r-full);
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    color: var(--text);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: var(--shadow-1);
    opacity: 0;
    transform: translateY(20px);
    pointer-events: none;
    transition: opacity var(--dur) var(--ease), transform var(--dur) var(--ease-spring);
    z-index: 90;
  }
  .scroll-top.visible {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }
  .scroll-top:hover {
    border-color: var(--border-strong);
    transform: translateY(-2px);
  }

  function textColorFor(hex) {
    const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    const lum = (0.299*r + 0.587*g + 0.114*b);
    return lum > 150 ? '#111' : '#fff';
  }

  function buildUI() {
    const spectrumStrip = document.getElementById('spectrumStrip');
    const carouselTrack = document.getElementById('carouselTrack');

    const stripFrag = document.createDocumentFragment();
    COLORS.forEach(([family, code, name, hex]) => {
      const fg = textColorFor(hex);
      const mini = document.createElement('div');
      mini.className = 'mini missing';
      mini.style.background = hex;
      mini.style.color = fg;
      mini.dataset.code = code;
      mini.dataset.family = family;
      mini.dataset.name = name;
      mini.dataset.search = (code + ' ' + name).toLowerCase();
      mini.setAttribute('role', 'button');
      mini.setAttribute('tabindex', '0');
      mini.setAttribute('aria-pressed', 'false');
      mini.title = code + ' · ' + name;
      const label = document.createElement('span');
      label.className = 'mini-label';
      label.textContent = code;
      mini.appendChild(label);
      stripFrag.appendChild(mini);
    });
    spectrumStrip.appendChild(stripFrag);

    const trackFrag = document.createDocumentFragment();
    FAMILIES.forEach(({ code: famCode, name: famName }) => {
      const famColors = COLORS.filter(c => c[0] === famCode);
      if (famColors.length === 0) return;

      const slide = document.createElement('div');
      slide.className = 'carousel-slide family-slide';
      slide.id = 'family-' + famCode;
      slide.dataset.family = famCode;
      slide.dataset.familyName = famName;
      slide.dataset.familyTotal = famColors.length;

      const grid = document.createElement('div');
      grid.className = 'grid';
      famColors.forEach(([, code, name, hex]) => {
        const fg = textColorFor(hex);
        const sw = document.createElement('div');
        sw.className = 'swatch missing';
        sw.style.background = hex;
        sw.style.color = fg;
        sw.dataset.code = code;
        sw.dataset.name = name;
        sw.dataset.search = (code + ' ' + name).toLowerCase();
        sw.setAttribute('role', 'button');
        sw.setAttribute('tabindex', '0');
        sw.setAttribute('aria-pressed', 'false');
        sw.innerHTML = '<div class="swatch-code">' + code + '</div><div class="swatch-name">' + name + '</div>';
        grid.appendChild(sw);
      });
      slide.appendChild(grid);
      trackFrag.appendChild(slide);
    });
    carouselTrack.appendChild(trackFrag);
  }

    const STORAGE_KEY = 'copic-owned';

    // Resilient storage
    const storage = (function() {
      let claudeStorageWorks = typeof window.storage !== 'undefined';
      let localStorageWorks = (function() {
        try {
          const k = '__copic_test__';
          window.localStorage.setItem(k, '1');
          window.localStorage.removeItem(k);
          return true;
        } catch (e) { return false; }
      })();

      function get(key) {
        return new Promise(function(resolve) {
          if (claudeStorageWorks) {
            window.storage.get(key).then(function(r) {
              if (r && r.value !== undefined) { resolve(r.value); return; }
              if (localStorageWorks) {
                try { resolve(window.localStorage.getItem(key)); } catch(e) { resolve(null); }
              } else resolve(null);
            }).catch(function() {
              claudeStorageWorks = false;
              if (localStorageWorks) {
                try { resolve(window.localStorage.getItem(key)); } catch(e) { resolve(null); }
              } else resolve(null);
            });
          } else if (localStorageWorks) {
            try { resolve(window.localStorage.getItem(key)); } catch(e) { resolve(null); }
          } else resolve(null);
        });
      }

      function set(key, value) {
        if (claudeStorageWorks) {
          window.storage.set(key, value).catch(function() { claudeStorageWorks = false; });
        }
        if (localStorageWorks) {
          try { window.localStorage.setItem(key, value); } catch(e) { localStorageWorks = false; }
        }
      }

      return { get: get, set: set };
    })();

    // Theme
    function initTheme() {
      storage.get(THEME_KEY).then(function(theme) {
        if (!theme) {
          theme = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        root.setAttribute('data-theme', theme);
        updateThemeButton();
      });
    }

    const SUN_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>';
    const MOON_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';

    function updateThemeButton() {
      const theme = root.getAttribute('data-theme');
      if (theme === 'dark') {
        themeIcon.innerHTML = SUN_ICON;
        themeLabel.textContent = 'Light';
      } else {
        themeIcon.innerHTML = MOON_ICON;
        themeLabel.textContent = 'Dark';

    themeBtn.addEventListener('click', function() {
      const current = root.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      root.setAttribute('data-theme', next);
      updateThemeButton();
      storage.set(THEME_KEY, next);
    });

    // Follow system theme changes when user has no explicit preference set
    if (window.matchMedia) {
      const mq = window.matchMedia('(prefers-color-scheme: dark)');
      mq.addEventListener('change', function(e) {
        storage.get(THEME_KEY).then(function(stored) {
          if (stored === 'light' || stored === 'dark') return;
          root.setAttribute('data-theme', e.matches ? 'dark' : 'light');
          updateThemeButton();
        });
      });

    // Tile state
    const allTiles = Array.from(document.querySelectorAll('.swatch, .mini'));
    const swatches = Array.from(document.querySelectorAll('.swatch'));

    function currentOwnedSet() {
      const set = new Set();
      swatches.forEach(function(s) {
        if (s.classList.contains('owned')) set.add(s.dataset.code);
      });
      return set;
    }

    function setTileOwned(tile, owned) {
      tile.classList.toggle('owned', owned);
      tile.classList.toggle('missing', !owned);
      tile.setAttribute('aria-pressed', owned ? 'true' : 'false');
    }

    function syncCode(code, owned) {
      allTiles.forEach(function(tile) {
        if (tile.dataset.code === code) setTileOwned(tile, owned);
      });
    }

    function applyOwnedSet(set) {
      allTiles.forEach(function(tile) { setTileOwned(tile, set.has(tile.dataset.code)); });
      updateStats();
    }

    function checkEmptyState() {
      const activeSlide = document.querySelector('.carousel-slide.active');
      if (!activeSlide) return;
      const tiles = activeSlide.querySelectorAll('.swatch, .mini');
      const isSearching = document.body.classList.contains('searching');
      const filter = document.body.getAttribute('data-filter');
      let visibleCount = 0;
      tiles.forEach(function(t) {
        const isOwned = t.classList.contains('owned');
        let visible = true;
        if (filter === 'owned' && !isOwned) visible = false;
        if (filter === 'missing' && isOwned) visible = false;
        if (isSearching && !t.classList.contains('match')) visible = false;
        if (visible) visibleCount++;
      });
      const isEmpty = visibleCount === 0;
      document.body.classList.toggle('empty-active', isEmpty);
      if (isEmpty) {
        const text = document.getElementById('emptyStateText');
        if (isSearching) text.textContent = 'No colors match your search.';
        else if (filter === 'owned') text.textContent = "You haven't marked any colors as owned yet.";
        else if (filter === 'missing') text.textContent = 'You own every color in this view.';
        else text.textContent = 'No colors to show.';
      }
    }

    function refreshCarouselMeta() {
      const activeSlide = document.querySelector('.carousel-slide.active');
      if (!activeSlide) return;
      const meta = document.getElementById('carouselMeta');
      const owned = currentOwnedSet();
      let count, slideTotal;
      if (activeSlide.id === 'spectrum') {
        count = owned.size;
        slideTotal = total;
      } else {
        slideTotal = parseInt(activeSlide.dataset.familyTotal, 10) || 0;
        count = 0;
        activeSlide.querySelectorAll('.swatch').forEach(function(s) {
          if (owned.has(s.dataset.code)) count++;
        });
      }
      meta.innerHTML = '<strong>' + count + '</strong> / ' + slideTotal;
      const pct = slideTotal ? (count / slideTotal * 100) : 0;
      carouselProgressFill.style.width = pct + '%';
      checkEmptyState();
    }

    function updateStats() {
      refreshCarouselMeta();
    }

    function saveOwned() {
      const owned = Array.from(currentOwnedSet());
      storage.set(STORAGE_KEY, JSON.stringify(owned));
    }

    function loadOwned() {
      storage.get(STORAGE_KEY).then(function(value) {
        if (!value) return;
        try {
          const arr = JSON.parse(value);
          applyOwnedSet(new Set(arr));
        } catch (e) { /* ignore */ }
      });
    }

    // Toast
    const toast = document.getElementById('toast');
    const toastText = toast.querySelector('.toast-text');
    let toastTimer;

    function showToast(message, removed) {
      toastText.textContent = message;
      toast.classList.toggle('removed', !!removed);
      toast.classList.add('visible');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(function() { toast.classList.remove('visible'); }, 1400);
    }

    // Tile click
    allTiles.forEach(function(tile) {
      tile.addEventListener('click', function() {
        const code = tile.dataset.code;
        const name = tile.dataset.name || '';
        const newOwned = !tile.classList.contains('owned');
        syncCode(code, newOwned);
        updateStats();
        saveOwned();
        const label = name ? code + ' · ' + name : code;
        showToast((newOwned ? 'Added ' : 'Removed ') + label, !newOwned);
      });
      tile.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          tile.click();
        }
      });
    });

    // Reset
    resetBtn.addEventListener('click', function() {
      if (!confirm('Clear your entire list? This cannot be undone.')) return;
      applyOwnedSet(new Set());
      saveOwned();
    });

    // Export
    exportBtn.addEventListener('click', function() {
      const owned = Array.from(currentOwnedSet()).sort();
      const allCodes = swatches.map(function(s) { return s.dataset.code; });
      const missing = allCodes.filter(function(c) { return owned.indexOf(c) === -1; }).sort();

      const text = 'COPIC SKETCH INVENTORY\n' +
        'Exported: ' + new Date().toISOString().split('T')[0] + '\n\n' +
        'OWNED (' + owned.length + '):\n' +
        owned.join(', ') + '\n\n' +
        'MISSING (' + missing.length + '):\n' +
        missing.join(', ');

      const blob = new Blob([text], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'copic-inventory-' + new Date().toISOString().split('T')[0] + '.txt';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    });

    // Import
    const importBtn = document.getElementById('importBtn');
    const importFile = document.getElementById('importFile');
    importBtn.addEventListener('click', function() { importFile.click(); });

    importFile.addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(evt) {
        const text = evt.target.result;
        const parsed = parseImport(text);
        if (parsed.size === 0) {
          alert('No valid Copic codes found in this file.');
          return;
        }
        const current = currentOwnedSet();
        const message = current.size > 0
          ? 'Import ' + parsed.size + ' markers? This will replace your current list of ' + current.size + '.'
          : 'Import ' + parsed.size + ' markers?';
        if (!confirm(message)) return;
        applyOwnedSet(parsed);
        saveOwned();
      };
      reader.onerror = function() { alert('Could not read file.'); };
      reader.readAsText(file);
      importFile.value = '';
    });

    function parseImport(text) {
      const allCodes = new Set(swatches.map(function(s) { return s.dataset.code; }));
      const found = new Set();
      try {
        const json = JSON.parse(text);
        const arr = Array.isArray(json) ? json : (json.owned || []);
        arr.forEach(function(code) { if (allCodes.has(code)) found.add(code); });
        if (found.size > 0) return found;
      } catch (e) { /* not JSON */ }

      // Find owned section: support both EN ("OWNED") and legacy NL ("IN BEZIT")
      let scanText = text;
      const ownedIdx = Math.max(text.indexOf('OWNED'), text.indexOf('IN BEZIT'));
      if (ownedIdx !== -1) {
        let endIdx = text.indexOf('MISSING', ownedIdx);
        if (endIdx === -1) endIdx = text.indexOf('MIST', ownedIdx);
        scanText = endIdx !== -1
          ? text.substring(ownedIdx, endIdx)
          : text.substring(ownedIdx);
      }
      const tokens = scanText.split(/[^A-Za-z0-9-]+/);
      tokens.forEach(function(token) {
        const clean = token.trim();
        if (clean && allCodes.has(clean)) found.add(clean);
      });
      return found;
    }

    const filterBtns = document.querySelectorAll('.filter-pill[data-filter]');

        else document.body.setAttribute('data-filter', filter);

    });

    const codeToggle = document.getElementById('codeToggle');

      if (localStorage.getItem('copic-codes-hidden') === 'true') {

        codeToggle.setAttribute('aria-pressed', 'true');

      codeToggle.setAttribute('aria-pressed', next ? 'true' : 'false');
      document.body.classList.toggle('hide-codes', next);
      try { localStorage.setItem('copic-codes-hidden', next ? 'true' : 'false'); } catch(e) {}
    });

    // Search (with expand/collapse)
    const searchWrap = document.getElementById('searchWrap');
    const searchToggle = document.getElementById('searchToggle');
    const searchInput = document.getElementById('searchInput');
    const clearSearch = document.getElementById('clearSearch');

    function applySearch(rawQuery) {
      const query = rawQuery.trim().toLowerCase();
      const hasQuery = query.length > 0;
      document.body.classList.toggle('searching', hasQuery);
      if (!hasQuery) {
        allTiles.forEach(function(t) { t.classList.remove('match'); });
      } else {
        allTiles.forEach(function(tile) {
          const haystack = tile.dataset.search || '';
          tile.classList.toggle('match', haystack.indexOf(query) !== -1);

    function openSearch() {
      searchWrap.dataset.open = 'true';
      searchToggle.setAttribute('aria-expanded', 'true');
      setTimeout(function() { searchInput.focus(); }, 50);

      searchWrap.dataset.open = 'false';
      searchToggle.setAttribute('aria-expanded', 'false');
      searchInput.value = '';
      applySearch('');
    }

    searchToggle.addEventListener('click', openSearch);
    clearSearch.addEventListener('click', closeSearch);

    document.addEventListener('click', function(e) {
      if (searchWrap.dataset.open !== 'true') return;
      if (searchWrap.contains(e.target)) return;
      closeSearch();
    });

    let searchDebounce;
    searchInput.addEventListener('input', function() {
      clearTimeout(searchDebounce);
      searchDebounce = setTimeout(function() { applySearch(searchInput.value); }, 60);
    });

    searchInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        const firstMatch = document.querySelector('.carousel-slide.active .swatch.match, .carousel-slide.active .mini.match');
        if (firstMatch) {
          // iOS Safari handles 'smooth' poorly; check support first
          const supportsSmooth = 'scrollBehavior' in document.documentElement.style;
          firstMatch.scrollIntoView({ behavior: supportsSmooth ? 'smooth' : 'auto', block: 'center' });
        }
      }
    });

    // Carousel
    const carouselTrack = document.getElementById('carouselTrack');
    const carouselSlides = Array.from(carouselTrack.querySelectorAll('.carousel-slide'));
    const carouselTitle = document.getElementById('carouselTitle');
    const prevFamilyBtn = document.getElementById('prevFamily');
    const nextFamilyBtn = document.getElementById('nextFamily');
    const chips = Array.from(document.querySelectorAll('.chip[data-jump]'));

    let currentSlide = 0;
    let slideAnimRaf = null;

    function gotoSlide(index) {
      const len = carouselSlides.length;
      const wrapped = ((index % len) + len) % len;
      currentSlide = wrapped;

      // Enable GPU promotion only during the animation, then release it
      carouselTrack.style.willChange = 'transform';
      carouselTrack.style.transform = 'translateX(-' + (wrapped * 100) + '%)';
      if (slideAnimRaf) clearTimeout(slideAnimRaf);
      slideAnimRaf = setTimeout(function() {
        carouselTrack.style.willChange = 'auto';
      }, 400);

      carouselSlides.forEach(function(s, i) {
        const active = i === wrapped;
        s.classList.toggle('active', active);
        // `inert` removes off-screen slides from tab order and the a11y tree,
        // which fixes axe `aria-hidden-focus` and the long Tab-walk on load.
        if (active) s.removeAttribute('inert');
        else s.setAttribute('inert', '');
      });
      const slide = carouselSlides[wrapped];
      carouselTitle.textContent = slide.dataset.familyName || 'All';
      refreshCarouselMeta();
      const slideId = slide.id;
      const targetJump = slideId === 'spectrum' ? 'spectrum' : slideId;
      chips.forEach(function(chip) {
        chip.classList.toggle('active', chip.dataset.jump === targetJump);
      });
      try { localStorage.setItem('copic-slide', String(wrapped)); } catch(e) {}
    }

    prevFamilyBtn.addEventListener('click', function() { gotoSlide(currentSlide - 1); });
    nextFamilyBtn.addEventListener('click', function() { gotoSlide(currentSlide + 1); });

    chips.forEach(function(chip) {
      chip.addEventListener('click', function() {
        const target = chip.dataset.jump;
        let idx;
        if (target === 'spectrum') idx = 0;
        else {
          const familyCode = target.replace(/^family-/, '');
          idx = carouselSlides.findIndex(function(s) { return s.dataset.family === familyCode; });
        }
        if (idx >= 0) gotoSlide(idx);
      });
    });

    // Restore last-used view filter and family slide on load
    let initialSlide = 0;
    try {
      const savedFilter = localStorage.getItem('copic-filter');
      if (savedFilter === 'owned' || savedFilter === 'missing') {
        document.body.setAttribute('data-filter', savedFilter);
        filterBtns.forEach(function(b) {
          b.classList.toggle('active', b.dataset.filter === savedFilter);
        });
      }
      const savedSlide = parseInt(localStorage.getItem('copic-slide'), 10);
      if (!isNaN(savedSlide) && savedSlide >= 0 && savedSlide < carouselSlides.length) {
        initialSlide = savedSlide;
      }
    } catch(e) {}
    gotoSlide(initialSlide);

    // Scroll-to-top
    const scrollTopBtn = document.getElementById('scrollTop');
    function updateScrollTop() {
      const visible = window.scrollY > 400;
      scrollTopBtn.classList.toggle('visible', visible);
      document.body.classList.toggle('has-scroll-top', visible);
    }
    let scrollRaf;
    window.addEventListener('scroll', function() {
      if (scrollRaf) return;
      scrollRaf = requestAnimationFrame(function() {
        updateScrollTop();
        scrollRaf = null;
      });
    }, { passive: true });
    scrollTopBtn.addEventListener('click', function() {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    // Keyboard shortcuts
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' && searchWrap.dataset.open === 'true') {
        e.preventDefault();
        closeSearch();
        return;
      }
      if (e.target.matches('input, textarea')) return;
      if (e.metaKey || e.ctrlKey || e.altKey) return;

      if (e.key === '/') {
        e.preventDefault();
        openSearch();
      } else if (e.key === '1') {
        document.querySelector('.filter-pill[data-filter="all"]').click();
      } else if (e.key === '2') {
        document.querySelector('.filter-pill[data-filter="owned"]').click();
      } else if (e.key === '3') {
        document.querySelector('.filter-pill[data-filter="missing"]').click();
      } else if (e.key === 'ArrowLeft') {
        gotoSlide(currentSlide - 1);
      } else if (e.key === 'ArrowRight') {
        gotoSlide(currentSlide + 1);
      } else if (e.key === 'c' || e.key === 'C') {
        codeToggle.click();
      } else if (e.key === 't' || e.key === 'T') {
        themeBtn.click();
      }
    });

    // Init
    initTheme();
    loadOwned();
    updateStats();
  })();
</script>

</body>
</html>
